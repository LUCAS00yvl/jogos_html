<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roguelike de Bolso</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --panel-bg: #1e1e1e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Cabeçalho de Status */
        #status-bar {
            background-color: var(--panel-bg);
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-bottom: 2px solid #333;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .stat-hp { color: var(--danger-color); }
        .stat-lvl { color: var(--accent-color); }
        .stat-xp { color: #2196F3; }
        .stat-gold { color: #FFD700; }

        /* Área do Log (Texto) */
        #log-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-entry {
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .color-good { color: var(--accent-color); }
        .color-bad { color: var(--danger-color); }
        .color-neutral { color: #aaa; }
        .color-system { color: #FFD700; font-weight: bold; }

        /* Controles */
        #controls {
            background-color: var(--panel-bg);
            padding: 15px;
            border-top: 2px solid #333;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 20px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.1s;
            touch-action: manipulation; /* Melhora a resposta no mobile */
        }

        button:active {
            background-color: #555;
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #222;
            color: #555;
            cursor: not-allowed;
        }

        #btn-attack { background-color: #8b0000; }
        #btn-attack:active { background-color: #aa0000; }
        
        #btn-heal { background-color: #006400; }
        #btn-heal:active { background-color: #008000; }

    </style>
</head>
<body>

    <div id="status-bar">
        <div>HP: <span id="hp" class="stat-hp">50/50</span></div>
        <div>Nível: <span id="lvl" class="stat-lvl">1</span></div>
        <div>XP: <span id="xp" class="stat-xp">0/10</span></div>
        <div>Ouro: <span id="gold" class="stat-gold">0</span></div>
    </div>

    <div id="log-container">
        <div class="log-entry color-system">Bem-vindo à Masmorra! Sobreviva o máximo que puder.</div>
    </div>

    <div id="controls">
        <button id="btn-explore" onclick="explore()">Explorar</button>
        <button id="btn-heal" onclick="heal()">Curar (10 Ouro)</button>
        <button id="btn-attack" onclick="attack()" disabled>Atacar</button>
        <button id="btn-flee" onclick="flee()" disabled>Fugir</button>
    </div>

    <script>
        // --- Estado do Jogador ---
        let player = {
            hp: 50,
            maxHp: 50,
            atk: 5,
            lvl: 1,
            xp: 0,
            maxXp: 10,
            gold: 0,
            state: 'IDLE' // IDLE ou COMBAT
        };

        // --- Inimigos ---
        const enemies = [
            { name: "Rato Gigante", hp: 15, atk: 2, xp: 4, gold: 2 },
            { name: "Goblin", hp: 25, atk: 4, xp: 8, gold: 5 },
            { name: "Esqueleto", hp: 35, atk: 6, xp: 12, gold: 8 },
            { name: "Orc", hp: 50, atk: 9, xp: 20, gold: 15 },
            { name: "Demônio Menor", hp: 80, atk: 14, xp: 40, gold: 30 }
        ];

        let currentEnemy = null;

        // --- Elementos da UI ---
        const logContainer = document.getElementById('log-container');
        const btnExplore = document.getElementById('btn-explore');
        const btnHeal = document.getElementById('btn-heal');
        const btnAttack = document.getElementById('btn-attack');
        const btnFlee = document.getElementById('btn-flee');

        // --- Funções Auxiliares ---
        function updateUI() {
            document.getElementById('hp').innerText = `${player.hp}/${player.maxHp}`;
            document.getElementById('lvl').innerText = player.lvl;
            document.getElementById('xp').innerText = `${player.xp}/${player.maxXp}`;
            document.getElementById('gold').innerText = player.gold;

            if (player.state === 'IDLE') {
                btnExplore.disabled = false;
                btnHeal.disabled = player.gold < 10 || player.hp === player.maxHp;
                btnAttack.disabled = true;
                btnFlee.disabled = true;
            } else {
                btnExplore.disabled = true;
                btnHeal.disabled = true;
                btnAttack.disabled = false;
                btnFlee.disabled = false;
            }
        }

        function log(message, type = 'color-neutral') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = message;
            logContainer.appendChild(entry);
            
            // Mantém apenas os últimos 30 logs para não travar o celular
            if (logContainer.children.length > 30) {
                logContainer.removeChild(logContainer.firstChild);
            }
            // Rola para baixo
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // --- Lógica do Jogo ---
        function explore() {
            if (player.state !== 'IDLE') return;

            const roll = Math.random();
            if (roll < 0.2) {
                log("Você encontra uma sala vazia. Apenas poeira e silêncio.", "color-neutral");
            } else if (roll < 0.4) {
                const foundGold = Math.floor(Math.random() * 5) + (player.lvl * 2);
                player.gold += foundGold;
                log(`Você encontrou um baú com ${foundGold} moedas de ouro!`, "color-good");
                updateUI();
            } else if (roll < 0.5) {
                const damage = Math.floor(Math.random() * 3) + player.lvl;
                player.hp -= damage;
                log(`Você pisou em uma armadilha e perdeu ${damage} de HP!`, "color-bad");
                checkDeath();
            } else {
                startCombat();
            }
        }

        function startCombat() {
            player.state = 'COMBAT';
            // Escolhe inimigo baseado no nível do jogador (com alguma aleatoriedade)
            const maxEnemyIndex = Math.min(enemies.length - 1, Math.floor(player.lvl / 2) + 1);
            const enemyTemplate = enemies[Math.floor(Math.random() * (maxEnemyIndex + 1))];
            
            // Escala o inimigo um pouco baseado no nível
            currentEnemy = {
                name: enemyTemplate.name,
                hp: enemyTemplate.hp + (player.lvl * 2),
                atk: enemyTemplate.atk + Math.floor(player.lvl / 1.5),
                xp: enemyTemplate.xp + player.lvl,
                gold: enemyTemplate.gold + player.lvl
            };

            log(`Um ${currentEnemy.name} apareceu! (HP: ${currentEnemy.hp})`, "color-bad");
            updateUI();
        }

        function attack() {
            if (player.state !== 'COMBAT' || !currentEnemy) return;

            // Jogador ataca
            const damageToEnemy = player.atk + Math.floor(Math.random() * 4);
            currentEnemy.hp -= damageToEnemy;
            log(`Você atacou o ${currentEnemy.name} causando ${damageToEnemy} de dano.`);

            if (currentEnemy.hp <= 0) {
                winCombat();
                return;
            }

            // Inimigo ataca
            enemyTurn();
        }

        function enemyTurn() {
            const damageToPlayer = currentEnemy.atk + Math.floor(Math.random() * 2);
            player.hp -= damageToPlayer;
            log(`O ${currentEnemy.name} te atacou causando ${damageToPlayer} de dano.`, "color-bad");
            checkDeath();
            updateUI();
        }

        function winCombat() {
            log(`Você derrotou o ${currentEnemy.name}! Recebeu ${currentEnemy.xp} XP e ${currentEnemy.gold} ouro.`, "color-good");
            player.xp += currentEnemy.xp;
            player.gold += currentEnemy.gold;
            player.state = 'IDLE';
            currentEnemy = null;
            
            checkLevelUp();
            updateUI();
        }

        function flee() {
            if (player.state !== 'COMBAT') return;
            
            if (Math.random() < 0.6) {
                log("Você conseguiu fugir com sucesso!", "color-neutral");
                player.state = 'IDLE';
                currentEnemy = null;
            } else {
                log("Você tentou fugir, mas tropeçou!", "color-bad");
                enemyTurn();
            }
            updateUI();
        }

        function heal() {
            if (player.state !== 'IDLE' || player.gold < 10) return;
            
            player.gold -= 10;
            const healAmount = Math.floor(player.maxHp * 0.4); // Cura 40% da vida
            player.hp = Math.min(player.maxHp, player.hp + healAmount);
            log(`Você bebeu uma poção e recuperou ${healAmount} de HP.`, "color-good");
            updateUI();
        }

        function checkLevelUp() {
            if (player.xp >= player.maxXp) {
                player.lvl++;
                player.xp -= player.maxXp;
                player.maxXp = Math.floor(player.maxXp * 1.5);
                player.maxHp += 10;
                player.hp = player.maxHp; // Cura completa ao subir de nível
                player.atk += 2;
                log(`NÍVEL SUBIU! Você agora é nível ${player.lvl}. Vida restaurada e atributos aumentados!`, "color-system");
            }
        }

        function checkDeath() {
            if (player.hp <= 0) {
                player.hp = 0;
                updateUI();
                log("VOCÊ MORREU! O jogo será reiniciado em 3 segundos...", "color-bad");
                
                // Desabilita tudo
                btnExplore.disabled = true;
                btnHeal.disabled = true;
                btnAttack.disabled = true;
                btnFlee.disabled = true;

                setTimeout(resetGame, 3000);
            }
        }

        function resetGame() {
            player = { hp: 50, maxHp: 50, atk: 5, lvl: 1, xp: 0, maxXp: 10, gold: 0, state: 'IDLE' };
            currentEnemy = null;
            logContainer.innerHTML = '';
            log("Você ressuscitou na entrada da masmorra. Boa sorte.", "color-system");
            updateUI();
        }

        // Inicializa a interface
        updateUI();
    </script>
</body>
</html>

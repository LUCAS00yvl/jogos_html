<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Curse of the Dead Web</title>
    <style>
        :root { --gold: #d4af37; --blood: #8a0303; --corruption: #6a0dad; }
        body { margin: 0; background: #020202; color: #eee; overflow: hidden; font-family: 'Georgia', serif; user-select: none; }
        canvas { display: block; touch-action: none; }
        
        /* UI Layers */
        #ui { position: absolute; inset: 0; pointer-events: none; padding: 20px; }
        .stats-top { display: flex; flex-direction: column; gap: 8px; }
        
        /* HP Bar */
        .bar-container { width: 220px; height: 14px; background: #111; border: 2px solid #333; position: relative; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #b03030, #601010); width: 100%; transition: width 0.2s; }
        
        /* Stamina Pips */
        #stamina-container { display: flex; gap: 5px; margin-top: 5px; }
        .pip { width: 20px; height: 8px; background: #30b060; border: 1px solid #111; opacity: 0.3; }
        .pip.active { opacity: 1; box-shadow: 0 0 5px #30b060; }

        /* Corruption */
        #corruption-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; text-align: center; }
        .corr-bar { width: 100%; height: 6px; background: #111; border: 1px solid #444; margin-top: 5px; }
        #corr-fill { height: 100%; background: var(--corruption); width: 0%; transition: width 0.5s; box-shadow: 0 0 10px var(--corruption); }

        /* Mobile Controls */
        #mobile-controls { position: absolute; inset: 0; display: none; }
        .btn { position: absolute; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; width: 70px; height: 70px; display: flex; items-center; justify-content: center; pointer-events: auto; }
        #btn-attack { bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(138, 3, 3, 0.2); }
        #btn-torch { bottom: 140px; right: 50px; }
        #btn-dash { bottom: 50px; right: 150px; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: auto; }
        
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 24px; text-align: center; text-shadow: 0 0 10px black; opacity: 0; transition: opacity 1s; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stats-top">
            <div class="bar-container"><div id="hp-fill"></div></div>
            <div id="stamina-container"></div>
        </div>
        
        <div id="corruption-container">
            <span id="corr-text" style="font-size: 12px; color: var(--corruption); letter-spacing: 2px;">CORRUPÇÃO: 0/100</span>
            <div class="corr-bar"><div id="corr-fill"></div></div>
        </div>
    </div>

    <div id="msg">MALDIÇÃO ATIVADA: SANGUE ESCURO</div>

    <div id="mobile-controls">
        <div id="joystick-zone"></div>
        <div id="btn-attack" class="btn">⚔️</div>
        <div id="btn-torch" class="btn">🕯️</div>
        <div id="btn-dash" class="btn">💨</div>
    </div>

    <canvas id="game"></canvas>

<script>
/** * CONFIGURAÇÃO E ESTADO
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let width, height;

const state = {
    isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent),
    playing: false,
    shake: 0,
    player: {
        x: 0, y: 0, 
        hp: 100, maxHp: 100,
        stamina: 5, maxStamina: 5, stamRegen: 0,
        corruption: 0,
        isTorch: true,
        angle: 0,
        isDashing: 0,
        isAttacking: 0,
        combo: 0
    },
    enemies: [],
    particles: [],
    input: { x: 0, y: 0, attack: false, dash: false, torch: true }
};

// Stamina UI
const stamContainer = document.getElementById('stamina-container');
for(let i=0; i<5; i++) {
    let d = document.createElement('div');
    d.className = 'pip active';
    stamContainer.appendChild(d);
}

/**
 * AUDIO (WEB AUDIO API)
 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq, type, dur, vol, slide = 0) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if(slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

/**
 * CONTROLES (PC & MOBILE)
 */
if(state.isMobile) document.getElementById('mobile-controls').style.display = 'block';

const keys = {};
window.onkeydown = (e) => {
    keys[e.code] = true;
    if(e.code === 'Digit1') state.player.isTorch = false;
    if(e.code === 'Digit2') state.player.isTorch = true;
    if(e.code === 'Space') triggerDash();
};
window.onkeyup = (e) => keys[e.code] = false;
window.onmousedown = () => triggerAttack();

function triggerAttack() {
    const p = state.player;
    if(!p.isTorch && p.stamina >= 1 && p.isAttacking <= 0) {
        p.isAttacking = 15;
        p.stamina--;
        p.combo = (p.combo + 1) % 3;
        playSfx(100 + (p.combo * 50), 'triangle', 0.2, 0.1, 50);
        state.shake = 5;
    }
}

function triggerDash() {
    const p = state.player;
    if(p.stamina >= 1 && p.isDashing <= 0) {
        p.isDashing = 12;
        p.stamina--;
        playSfx(50, 'sine', 0.1, 0.1, 10);
    }
}

// Mobile Buttons
if(state.isMobile) {
    document.getElementById('btn-attack').ontouchstart = (e) => { e.preventDefault(); state.player.isTorch = false; triggerAttack(); };
    document.getElementById('btn-torch').ontouchstart = (e) => { e.preventDefault(); state.player.isTorch = true; };
    document.getElementById('btn-dash').ontouchstart = (e) => { e.preventDefault(); triggerDash(); };
}

/**
 * LOGICA DO JOGO
 */
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    state.player.x = width/2;
    state.player.y = height/2;
}

function spawnEnemy() {
    const ang = Math.random() * Math.PI * 2;
    state.enemies.push({
        x: state.player.x + Math.cos(ang) * 400,
        y: state.player.y + Math.sin(ang) * 400,
        hp: 40, maxHp: 40,
        speed: 1 + Math.random(),
        type: Math.random() > 0.8 ? 'heavy' : 'normal'
    });
}

function update() {
    const p = state.player;

    // Movimento
    let mx = 0, my = 0;
    if(keys['KeyW']) my -= 1;
    if(keys['KeyS']) my += 1;
    if(keys['KeyA']) mx -= 1;
    if(keys['KeyD']) mx += 1;

    const mag = Math.hypot(mx, my);
    if(mag > 0) {
        const speed = p.isDashing > 0 ? 12 : 3.5;
        p.x += (mx/mag) * speed;
        p.y += (my/mag) * speed;
        p.angle = Math.atan2(my, mx);
    }

    if(p.isDashing > 0) p.isDashing--;
    if(p.isAttacking > 0) p.isAttacking--;

    // Stamina Regen
    p.stamRegen++;
    if(p.stamRegen > 60) {
        if(p.stamina < p.maxStamina) p.stamina++;
        p.stamRegen = 0;
    }

    // Inimigos
    state.enemies.forEach((en, i) => {
        const dx = p.x - en.x;
        const dy = p.y - en.y;
        const dist = Math.hypot(dx, dy);

        // Seguir player
        en.x += (dx/dist) * en.speed;
        en.y += (dy/dist) * en.speed;

        // Combate
        if(p.isAttacking === 10 && dist < 70) {
            en.hp -= 15;
            state.shake = 10;
            p.corruption += 2;
            for(let j=0; j<5; j++) state.particles.push({x: en.x, y: en.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: '#8a0303'});
            playSfx(60, 'sawtooth', 0.1, 0.05);
        }

        if(dist < 30 && p.isDashing <= 0) {
            p.hp -= 0.5;
            state.shake = 5;
            if(Math.random() > 0.95) p.corruption += 1;
        }

        if(en.hp <= 0) state.enemies.splice(i, 1);
    });

    // Corrupção
    if(p.corruption >= 100) {
        p.corruption = 0;
        showCurse();
    }

    updateUI();
    draw();
    requestAnimationFrame(update);
}

function showCurse() {
    const msg = document.getElementById('msg');
    msg.style.opacity = 1;
    playSfx(40, 'square', 0.5, 0.2, 20);
    setTimeout(() => msg.style.opacity = 0, 3000);
}

function updateUI() {
    document.getElementById('hp-fill').style.width = state.player.hp + '%';
    document.getElementById('corr-fill').style.width = state.player.corruption + '%';
    document.getElementById('corr-text').innerText = `CORRUPÇÃO: ${Math.floor(state.player.corruption)}/100`;
    
    const pips = document.querySelectorAll('.pip');
    pips.forEach((p, i) => {
        p.className = i < state.player.stamina ? 'pip active' : 'pip';
    });
}

/**
 * RENDERIZAÇÃO VISUAL REFINADA
 */
function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#050508';
    ctx.fillRect(0, 0, width, height);

    if(state.shake > 0) {
        ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
        state.shake *= 0.9;
    }

    // Desenhar Inimigos
    state.enemies.forEach(en => {
        ctx.fillStyle = '#1a1a1a';
        ctx.strokeStyle = '#300';
        ctx.lineWidth = 2;
        ctx.save();
        ctx.translate(en.x, en.y);
        ctx.rotate(Math.atan2(state.player.y - en.y, state.player.x - en.x));
        ctx.fillRect(-15, -15, 30, 30);
        ctx.strokeRect(-15, -15, 30, 30);
        // Olhos vermelhos
        ctx.fillStyle = 'red';
        ctx.fillRect(5, -8, 4, 4); ctx.fillRect(5, 4, 4, 4);
        ctx.restore();
    });

    // Partículas
    state.particles.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
        p.x += p.vx; p.y += p.vy; p.life--;
        if(p.life <= 0) state.particles.splice(i, 1);
    });

    // Player
    ctx.fillStyle = state.player.isTorch ? '#d4af37' : '#eee';
    ctx.beginPath();
    ctx.arc(state.player.x, state.player.y, 12, 0, Math.PI*2);
    ctx.fill();

    // Feedback de Ataque
    if(state.player.isAttacking > 0) {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y, 50, state.player.angle - 1, state.player.angle + 1);
        ctx.stroke();
    }

    // --- SISTEMA DE ILUMINAÇÃO DINÂMICA ---
    const lightCanvas = document.createElement('canvas');
    lightCanvas.width = width; lightCanvas.height = height;
    const lctx = lightCanvas.getContext('2d');

    // Escuridão base
    lctx.fillStyle = 'rgba(0,0,0,0.92)';
    lctx.fillRect(0, 0, width, height);

    // Luz do Player
    const radius = state.player.isTorch ? 250 : 100;
    const grad = lctx.createRadialGradient(state.player.x, state.player.y, 0, state.player.x, state.player.y, radius);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.4, 'rgba(255,200,100,0.4)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    
    lctx.globalCompositeOperation = 'destination-out';
    lctx.fillStyle = grad;
    lctx.beginPath();
    lctx.arc(state.player.x, state.player.y, radius, 0, Math.PI*2);
    lctx.fill();

    ctx.drawImage(lightCanvas, 0, 0);
}

window.addEventListener('resize', resize);
resize();
setInterval(spawnEnemy, 2500);
requestAnimationFrame(update);

// Iniciar Áudio no primeiro clique
window.addEventListener('click', () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
}, {once: true});

</script>
</body>
</html>

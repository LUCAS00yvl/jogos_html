<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Metal Slug - Web Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0; padding: 0; background: #000;
            overflow: hidden; touch-action: none;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
            image-rendering: pixelated; /* Dá o aspecto "crocante" de Pixel Art */
        }
        
        /* Controles Mobile */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .d-pad, .action-buttons {
            position: absolute; bottom: 30px;
            display: flex; gap: 20px; pointer-events: auto;
        }
        .d-pad { left: 30px; }
        .action-buttons { right: 30px; }
        
        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255,255,255,0.5); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 24px; color: white;
            text-shadow: 2px 2px 0 #000;
            user-select: none; -webkit-user-select: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.95); }

        /* Tela Inicial */
        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2a2a2a 0%, #000 100%);
            color: #fff; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            z-index: 10; pointer-events: auto; text-align: center;
        }
        h1 { 
            color: #ffcc00; font-size: 3em; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 4px 4px 0px #b30000, 8px 8px 0px #000; 
            -webkit-text-stroke: 2px #000;
        }
        .instructions { font-size: 12px; line-height: 2; color: #ccc; margin-bottom: 30px; }
        .start-btn {
            padding: 15px 30px; font-size: 16px; font-family: 'Press Start 2P', monospace;
            background: #ff0000; color: white; border: 4px solid #fff;
            border-radius: 0; cursor: pointer; box-shadow: 6px 6px 0 #000;
            text-transform: uppercase; transition: all 0.1s;
        }
        .start-btn:active { box-shadow: 2px 2px 0 #000; transform: translate(4px, 4px); }

        @media (hover: hover) and (pointer: fine) {
            .btn { opacity: 0.15; } 
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer" id="uiLayer" style="display: none;">
        <div class="d-pad">
            <div class="btn" id="btnLeft">◄</div>
            <div class="btn" id="btnRight">►</div>
        </div>
        <div class="action-buttons">
            <div class="btn" id="btnShoot" style="background: rgba(255, 50, 50, 0.3);">X</div>
            <div class="btn" id="btnJump" style="background: rgba(50, 150, 255, 0.3);">▲</div>
        </div>
    </div>

    <div id="startScreen">
        <h1>METAL WEB SQUAD</h1>
        <div class="instructions">
            <p>[ PC ]: Setas movem | ESPAÇO pula | Z ou C atira</p>
            <p>[ Mobile ]: Use os botões na tela</p>
        </div>
        <button class="start-btn" id="startBtn">INSERT COIN</button>
    </div>

<script>
// --- MOTOR DE ÁUDIO (Mantido e ajustado) ---
const AudioEngine = {
    ctx: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    playTone(freq, type, duration, vol=0.1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    sfxShoot() { this.playTone(600, 'square', 0.1, 0.05); this.playTone(800, 'sawtooth', 0.05, 0.05); },
    sfxJump() { this.playTone(250, 'sine', 0.2, 0.1); setTimeout(() => this.playTone(400, 'sine', 0.1, 0.1), 50); },
    sfxExplosion() { this.playTone(150, 'square', 0.4, 0.3); this.playTone(50, 'sawtooth', 0.6, 0.3); }
};

// --- MOTOR DO JOGO ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let lastTime = 0;
const keys = { left: false, right: false, jump: false, shoot: false };

const game = {
    gravity: 1200, 
    groundY: 0,
    cameraX: 0,
    score: 0,
    state: 'menu',
    time: 0
};

// --- FUNÇÕES DE DESENHO (SPRITES PROCEDURAIS) ---
function drawMarco(ctx, bounce, isShooting) {
    // Cores
    const skin = '#fcd8a8', hair = '#f8e000', band = '#fff', vest = '#c83008';
    const shirt = '#e8e8e8', pants = '#486830', boots = '#282828';
    
    // Pernas / Botas (com animação de caminhada)
    ctx.fillStyle = boots;
    ctx.fillRect(-12, -8 - bounce, 12, 8); // Perna trás
    ctx.fillRect(2, -8 + bounce, 12, 8);   // Perna frente
    
    ctx.fillStyle = pants;
    ctx.fillRect(-14, -22 - bounce, 14, 14);
    ctx.fillRect(0, -22 + bounce, 14, 14);

    // Tronco
    ctx.fillStyle = shirt;
    ctx.fillRect(-12, -36 - bounce/2, 24, 14);
    ctx.fillStyle = vest; // Colete aberto
    ctx.fillRect(-14, -36 - bounce/2, 10, 16);
    ctx.fillRect(2, -36 - bounce/2, 8, 16);

    // Cabeça
    ctx.fillStyle = skin;
    ctx.fillRect(-10, -52 - bounce/2, 20, 16);
    ctx.fillStyle = hair; // Cabelo
    ctx.fillRect(-12, -56 - bounce/2, 24, 6);
    ctx.fillStyle = band; // Faixa na cabeça
    ctx.fillRect(-12, -50 - bounce/2, 24, 4);
    
    // Olho
    ctx.fillStyle = '#000';
    ctx.fillRect(4, -46 - bounce/2, 4, 4);

    // Braço e Arma
    ctx.fillStyle = skin;
    ctx.fillRect(0, -30 - bounce/2, 14, 6);
    ctx.fillStyle = '#888'; // Arma principal
    ctx.fillRect(10, -32 - (isShooting?2:0) - bounce/2, 20, 8);
    ctx.fillStyle = '#444'; // Cano
    ctx.fillRect(30, -30 - (isShooting?2:0) - bounce/2, 8, 4);
}

function drawRebel(ctx, bounce) {
    const skin = '#fcd8a8', uniform = '#587848', shadow = '#385030', boots = '#282828';

    // Botas
    ctx.fillStyle = boots;
    ctx.fillRect(-10, -6 - bounce, 10, 6);
    ctx.fillRect(2, -6 + bounce, 10, 6);
    
    // Calças
    ctx.fillStyle = shadow;
    ctx.fillRect(-12, -18 - bounce, 12, 12);
    ctx.fillRect(0, -18 + bounce, 12, 12);

    // Casaco
    ctx.fillStyle = uniform;
    ctx.fillRect(-12, -32 - bounce/2, 24, 14);
    // Cinto
    ctx.fillStyle = '#684020';
    ctx.fillRect(-12, -22 - bounce/2, 24, 4);

    // Cabeça e Capacete
    ctx.fillStyle = skin;
    ctx.fillRect(-10, -44 - bounce/2, 20, 12);
    ctx.fillStyle = uniform; // Capacete
    ctx.beginPath();
    ctx.arc(0, -44 - bounce/2, 12, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(-14, -44 - bounce/2, 28, 4); // Aba do capacete
    
    // Olho
    ctx.fillStyle = '#000';
    ctx.fillRect(4, -40 - bounce/2, 4, 4);

    // Arma (Rifle)
    ctx.fillStyle = '#444';
    ctx.fillRect(-8, -26 - bounce/2, 24, 4);
    ctx.fillStyle = '#684020'; // Coronha
    ctx.fillRect(-12, -26 - bounce/2, 8, 4);
}

// --- CLASSES ---
class Player {
    constructor() {
        this.w = 30; this.h = 56;
        this.x = 100; this.y = 0;
        this.vx = 0; this.vy = 0;
        this.speed = 220;
        this.jumpForce = -550;
        this.onGround = false;
        this.facing = 1; 
        this.cooldown = 0;
    }
    update(dt) {
        this.vx = 0;
        if (keys.left) { this.vx = -this.speed; this.facing = -1; }
        if (keys.right) { this.vx = this.speed; this.facing = 1; }
        this.x += this.vx * dt;

        if (this.x < game.cameraX) this.x = game.cameraX; // Impede voltar

        this.vy += game.gravity * dt;
        this.y += this.vy * dt;

        if (this.y + this.h >= game.groundY) {
            this.y = game.groundY - this.h;
            this.vy = 0;
            this.onGround = true;
        } else {
            this.onGround = false;
        }

        if (keys.jump && this.onGround) {
            this.vy = this.jumpForce;
            this.onGround = false;
            AudioEngine.sfxJump();
            keys.jump = false; 
        }

        this.cooldown -= dt;
        if (keys.shoot && this.cooldown <= 0) {
            // Cria a bala ("Heavy Machine Gun" style)
            bullets.push(new Bullet(this.x + (this.facing===1?this.w/2:-this.w/2), this.y + 20, this.facing));
            // Fogo do cano
            particles.push(new MuzzleFlash(this.x + (this.facing===1?this.w+15:-15), this.y + 24, this.facing));
            AudioEngine.sfxShoot();
            this.cooldown = 0.12; 
        }

        if (this.x > game.cameraX + canvas.width * 0.4) {
            game.cameraX = this.x - canvas.width * 0.4;
        }
    }
    draw(ctx) {
        let cx = this.x - game.cameraX + this.w/2;
        let cy = this.y + this.h;
        
        let bounce = (this.onGround && this.vx !== 0) ? Math.sin(game.time * 20) * 3 : 0;
        let isShooting = this.cooldown > 0;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(this.facing, 1);
        drawMarco(ctx, bounce, isShooting);
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, dir) {
        this.x = x; this.y = y;
        this.w = 20; this.h = 8;
        this.speed = 1000 * dir;
        this.active = true;
    }
    update(dt) {
        this.x += this.speed * dt;
        if (this.x > game.cameraX + canvas.width || this.x < game.cameraX) this.active = false;
    }
    draw(ctx) {
        let cx = this.x - game.cameraX;
        ctx.fillStyle = '#ffcc00'; // Aura
        ctx.fillRect(cx - 2, this.y - 2, this.w + 4, this.h + 4);
        ctx.fillStyle = '#ffffff'; // Núcleo
        ctx.fillRect(cx, this.y, this.w, this.h);
    }
}

class Enemy {
    constructor(x) {
        this.w = 30; this.h = 44;
        this.x = x;
        this.y = game.groundY - this.h;
        this.speed = -80;
        this.active = true;
        this.offset = Math.random() * 10;
    }
    update(dt) {
        if (this.x < game.cameraX + canvas.width + 100) {
            this.x += this.speed * dt;
        }
        if (this.x < game.cameraX - 100) this.active = false;
    }
    draw(ctx) {
        let cx = this.x - game.cameraX + this.w/2;
        let cy = this.y + this.h;
        let bounce = Math.sin(game.time * 15 + this.offset) * 2;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(-1, 1); // Sempre olham pra esquerda
        drawRebel(ctx, bounce);
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type; // 0: spark, 1: smoke
        this.life = 1.0;
        this.maxLife = type === 1 ? 0.6 : 0.4;
        
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * (type === 1 ? 100 : 300);
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = type === 1 ? Math.random() * 20 + 10 : Math.random() * 6 + 2;
    }
    update(dt) {
        this.x += this.vx * dt; 
        this.y += this.vy * dt;
        this.life -= dt;
        if (this.type === 0) this.vy += game.gravity * 0.5 * dt; // Faíscas caem
    }
    draw(ctx) {
        let p = Math.max(0, this.life / this.maxLife);
        ctx.save();
        if (this.type === 1) {
            // Fumaça/Fogo: Branco -> Amarelo -> Vermelho -> Cinza
            if(p > 0.8) ctx.fillStyle = '#fff';
            else if(p > 0.5) ctx.fillStyle = '#ffaa00';
            else if(p > 0.3) ctx.fillStyle = '#cc0000';
            else ctx.fillStyle = 'rgba(50,50,50,0.5)';
            ctx.beginPath();
            ctx.arc(this.x - game.cameraX, this.y, this.size * p, 0, Math.PI*2);
            ctx.fill();
        } else {
            // Faíscas
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(this.x - game.cameraX, this.y, this.size, this.size);
        }
        ctx.restore();
    }
}

class MuzzleFlash {
    constructor(x, y, dir) {
        this.x = x; this.y = y; this.dir = dir;
        this.life = 0.05;
    }
    update(dt) { this.life -= dt; }
    draw(ctx) {
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(this.x - game.cameraX, this.y, 15, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x - game.cameraX, this.y, 8, 0, Math.PI*2);
        ctx.fill();
    }
}

let player;
let bullets = [];
let enemies = [];
let particles = [];
let spawnTimer = 0;

function resetGame() {
    game.cameraX = 0; game.score = 0; game.time = 0;
    player = new Player();
    bullets = []; enemies = []; particles = [];
    for(let i=1; i<4; i++) enemies.push(new Enemy(600 + i*400));
}

function spawnExplosion(x, y) {
    AudioEngine.sfxExplosion();
    // Fumaça
    for(let i=0; i<8; i++) particles.push(new Particle(x, y, 1));
    // Faíscas
    for(let i=0; i<15; i++) particles.push(new Particle(x, y, 0));
}

function checkCollisions() {
    bullets.forEach(b => {
        if (!b.active) return;
        enemies.forEach(e => {
            if (!e.active) return;
            if (b.x < e.x + e.w && b.x + b.w > e.x &&
                b.y < e.y + e.h && b.y + b.h > e.y) {
                b.active = false; e.active = false;
                game.score += 100;
                spawnExplosion(e.x + e.w/2, e.y + e.h/2);
            }
        });
    });

    enemies.forEach(e => {
        if (!e.active) return;
        // Hitbox do player um pouco menor que o sprite
        if (player.x + 10 < e.x + e.w && player.x + player.w - 10 > e.x &&
            player.y + 10 < e.y + e.h && player.y + player.h > e.y) {
            game.state = 'gameover';
            spawnExplosion(player.x + player.w/2, player.y + player.h/2);
        }
    });
}

// --- DESENHO DO CENÁRIO ---
function drawEnvironment(ctx) {
    // Céu
    let skyGradient = ctx.createLinearGradient(0, 0, 0, game.groundY);
    skyGradient.addColorStop(0, '#5a82c6');
    skyGradient.addColorStop(1, '#a8c8e8');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, canvas.width, game.groundY);

    // Montanhas de fundo (Parallax lento)
    ctx.fillStyle = '#7a92a8';
    let bgX = -(game.cameraX * 0.1) % 600;
    for(let i=0; i<4; i++) {
        ctx.beginPath();
        ctx.moveTo(bgX + i*600, game.groundY);
        ctx.lineTo(bgX + i*600 + 300, game.groundY - 200);
        ctx.lineTo(bgX + i*600 + 600, game.groundY);
        ctx.fill();
    }

    // Dunas/Montanhas médias (Parallax médio)
    ctx.fillStyle = '#b89050';
    let mdX = -(game.cameraX * 0.3) % 400;
    for(let i=0; i<6; i++) {
        ctx.beginPath();
        ctx.moveTo(mdX + i*400, game.groundY);
        ctx.lineTo(mdX + i*400 + 200, game.groundY - 100);
        ctx.lineTo(mdX + i*400 + 400, game.groundY);
        ctx.fill();
    }

    // Chão e Terra
    ctx.fillStyle = '#d8a860'; // Areia
    ctx.fillRect(0, game.groundY, canvas.width, canvas.height - game.groundY);
    
    // Crosta superior do chão
    ctx.fillStyle = '#a87840'; 
    ctx.fillRect(0, game.groundY, canvas.width, 15);
    
    // Detalhes rochosos no chão (Parallax 1:1)
    ctx.fillStyle = '#885820';
    let groundOffset = -(game.cameraX % 100);
    for(let i=0; i<canvas.width/100 + 2; i++) {
        ctx.fillRect(groundOffset + i*100 + 20, game.groundY + 20, 30, 10);
        ctx.fillRect(groundOffset + i*100 + 60, game.groundY + 40, 15, 8);
    }
}

function update(dt) {
    if (game.state !== 'playing') return;
    game.time += dt;

    player.update(dt);
    
    bullets.forEach(b => b.update(dt));
    bullets = bullets.filter(b => b.active);

    enemies.forEach(e => e.update(dt));
    enemies = enemies.filter(e => e.active);

    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);

    spawnTimer += dt;
    if (spawnTimer > 1.5 - (game.score/5000)) { // Fica mais difícil
        enemies.push(new Enemy(game.cameraX + canvas.width + 50));
        spawnTimer = 0;
    }

    checkCollisions();
}

function drawHUD(ctx) {
    ctx.fillStyle = '#000';
    ctx.font = '20px "Press Start 2P", Courier New';
    ctx.fillText(`SCORE: ${game.score}`, 22, 42); // Sombra
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`SCORE: ${game.score}`, 20, 40);

    ctx.fillStyle = '#000';
    ctx.font = '14px "Press Start 2P", Courier New';
    ctx.fillText(`DIST: ${Math.floor(player.x/10)}m`, 22, 72);
    ctx.fillStyle = '#fff';
    ctx.fillText(`DIST: ${Math.floor(player.x/10)}m`, 20, 70);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (game.state === 'playing' || game.state === 'gameover') {
        drawEnvironment(ctx);
        
        if (game.state === 'playing') player.draw(ctx);
        
        bullets.forEach(b => b.draw(ctx));
        enemies.forEach(e => e.draw(ctx));
        particles.forEach(p => p.draw(ctx));

        drawHUD(ctx);
    } 
    
    if (game.state === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.textAlign = 'center';
        ctx.fillStyle = '#000';
        ctx.font = '40px "Press Start 2P"';
        ctx.fillText("MISSION FAILED", canvas.width/2 + 4, canvas.height/2 + 4);
        ctx.fillStyle = '#ff0000';
        ctx.fillText("MISSION FAILED", canvas.width/2, canvas.height/2);
        
        ctx.fillStyle = '#fff';
        ctx.font = '16px "Press Start 2P"';
        ctx.fillText("Pressione [F5] para Continuar", canvas.width/2, canvas.height/2 + 60);
        ctx.textAlign = 'left';
    }
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; 
    lastTime = timestamp;

    update(dt);
    draw();

    requestAnimationFrame(loop);
}

// --- CONTROLES E INICIALIZAÇÃO ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    game.groundY = canvas.height * 0.75; // Baixei o chão para dar mais espaço ao céu
    if(player) player.y = game.groundY - player.h;
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space' && !keys.jump) keys.jump = true;
    if (e.code === 'KeyZ' || e.code === 'KeyC') keys.shoot = true;
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.jump = false;
    if (e.code === 'KeyZ' || e.code === 'KeyC') keys.shoot = false;
});

const bindTouch = (id, keyName) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
    el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
};
bindTouch('btnLeft', 'left');
bindTouch('btnRight', 'right');
bindTouch('btnJump', 'jump');
bindTouch('btnShoot', 'shoot');

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('uiLayer').style.display = 'block';
    
    AudioEngine.init();
    resetGame();
    game.state = 'playing';
    lastTime = performance.now();
    requestAnimationFrame(loop);
});

</script>
</body>
</html>

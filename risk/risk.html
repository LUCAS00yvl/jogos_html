<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Risk of Rain - Chests & Upgrades</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0d0d14; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; }
        
        /* ALERTA DE ROTAÇÃO PARA MOBILE */
        #rotate-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d14; z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
            box-sizing: border-box; color: #f1c40f; font-size: 20px; font-weight: bold;
        }
        @media screen and (orientation: portrait) {
            #rotate-warning { display: flex; }
            canvas, #ui, #controls, #inventory { display: none !important; }
        }

        /* HUD Principal */
        #ui {
            position: absolute; top: 15px; left: 15px;
            font-size: 14px; pointer-events: none; text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar-bg { width: 150px; height: 15px; background: #333; margin-top: 5px; border-radius: 3px; border: 1px solid #000;}
        .hp-bar-fill { height: 100%; background: #44ff44; width: 100%; border-radius: 3px; transition: width 0.2s; }
        
        /* Inventário de Itens */
        #inventory {
            position: absolute; top: 15px; right: 15px; width: 200px;
            display: flex; flex-wrap: wrap-reverse; justify-content: flex-end; gap: 5px;
            pointer-events: none;
        }
        .item-icon {
            width: 20px; height: 20px; border: 1px solid #000; border-radius: 3px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; background: rgba(10, 10, 20, 0.95);
            padding: 30px; border: 2px solid #ff4444; border-radius: 10px; box-shadow: 0 0 20px #ff4444;
        }
        #game-over button {
            margin-top: 15px; padding: 10px 20px; background: transparent; color: #ff4444;
            border: 2px solid #ff4444; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        #boss-warning {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4444; font-size: 30px; font-weight: bold; text-shadow: 2px 2px 0 #000;
            display: none; animation: blink 1s infinite; pointer-events: none;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Controles Mobile */
        #controls {
            position: absolute; bottom: 20px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none;
        }
        .control-group { display: flex; gap: 20px; pointer-events: auto; }
        .btn {
            background: rgba(20, 20, 30, 0.6); border: 2px solid rgba(255, 255, 255, 0.2);
            width: 70px; height: 70px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 14px; font-weight: bold;
            color: rgba(255,255,255,0.7); touch-action: none; backdrop-filter: blur(4px);
        }
        .btn.active { background: rgba(255, 255, 255, 0.3); transform: scale(0.9); border-color: #fff; color: #fff; }
    </style>
</head>
<body>

    <div id="rotate-warning">
        📱<br><br>Por favor, vire o seu celular na horizontal (modo paisagem) para jogar!
    </div>

    <div id="ui">
        Ameaça: <span id="diff-text" style="color: #44ff44;">Mínimo</span><br>
        Tempo: <span id="time-display">00:00</span><br>
        Ouro: <span id="gold-display" style="color:#f1c40f;">$0</span>
        <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp-bar"></div></div>
    </div>

    <div id="inventory"></div>

    <div id="boss-warning">ALERTA: TELETRANSPORTADOR ATIVO!</div>

    <div id="game-over">
        <h2 style="color: #ff4444; margin-top:0;">VOCÊ MORREU</h2>
        <p>Tempo: <span id="final-time"></span></p>
        <button onclick="location.reload()">REINICIAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btn-shoot">TIRO</div>
            <div class="btn" id="btn-jump">PULO</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const keys = { left: false, right: false, jump: false, shoot: false };

        function setupButton(id, keyName) {
            const btn = document.getElementById(id);
            const press = (e) => { e.preventDefault(); keys[keyName] = true; btn.classList.add('active'); };
            const release = (e) => { e.preventDefault(); keys[keyName] = false; btn.classList.remove('active'); };
            btn.addEventListener('touchstart', press); btn.addEventListener('touchend', release);
            btn.addEventListener('mousedown', press); btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }
        setupButton('btn-left', 'left'); setupButton('btn-right', 'right');
        setupButton('btn-jump', 'jump'); setupButton('btn-shoot', 'shoot');

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
                if(!keys.jump) player.jumpPressed = true;
                keys.jump = true;
            }
            if (e.code === 'KeyZ' || e.code === 'KeyJ') keys.shoot = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false;
            if (e.code === 'KeyZ' || e.code === 'KeyJ') keys.shoot = false;
        });

        const GRAVITY = 0.6;
        const GROUND_HEIGHT = 60;

        let gameFrame = 0, gold = 0, isGameOver = false;
        let gameTimeSeconds = 0, difficultyMultiplier = 1;
        let bossSpawned = false;

        // Entidades
        const player = {
            x: canvas.width / 2, y: 100, width: 22, height: 42,
            vx: 0, vy: 0, speed: 6, jumpPower: -11,
            isGrounded: false, jumpsLeft: 2, facingRight: true, 
            hp: 100, maxHp: 100, shootCooldown: 0, maxShootCooldown: 15, 
            invulnTimer: 0, jumpPressed: false,
            // Status aprimoráveis
            critChance: 0.05, healOnKill: 0, items: []
        };

        const bullets = [], enemies = [], enemyBullets = [], particles = [], chests = [];
        
        const stars = Array.from({length: 50}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * (canvas.height - GROUND_HEIGHT),
            size: Math.random() * 2, speed: Math.random() * 0.5
        }));

        const platforms = [
            { x: canvas.width * 0.1, y: canvas.height - 150, w: 120, h: 15 },
            { x: canvas.width * 0.6, y: canvas.height - 200, w: 150, h: 15 },
            { x: canvas.width * 0.35, y: canvas.height - 280, w: 100, h: 15 }
        ];

        // Definição dos Itens
        const ITEM_POOL = [
            { name: "Seringa", color: "#e67e22", apply: () => { player.maxShootCooldown = Math.max(5, player.maxShootCooldown - 2); } },
            { name: "Pata de Cabra", color: "#bdc3c7", apply: () => { player.speed += 0.8; } },
            { name: "Óculos", color: "#e74c3c", apply: () => { player.critChance += 0.1; } },
            { name: "Dente", color: "#2ecc71", apply: () => { player.healOnKill += 5; } }
        ];

        setInterval(() => {
            if (isGameOver) return;
            gameTimeSeconds++;
            let m = Math.floor(gameTimeSeconds / 60).toString().padStart(2, '0');
            let s = (gameTimeSeconds % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${m}:${s}`;
            difficultyMultiplier = 1 + (gameTimeSeconds / 45); 

            if(gameTimeSeconds === 60 && !bossSpawned) spawnBoss();
        }, 1000);

        function checkCollision(r1, r2) {
            return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y);
        }

        function createParticles(x, y, color, count = 5, speedMod = 1) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 10 * speedMod, vy: (Math.random() - 0.5) * 10 * speedMod,
                    life: 20 + Math.random() * 10, color: color
                });
            }
        }

        function spawnEnemy() {
            const isFlying = Math.random() > 0.7;
            const side = Math.random() > 0.5 ? 1 : -1;
            const hp = (isFlying ? 3 : 6) * difficultyMultiplier;
            
            enemies.push({
                x: side === 1 ? canvas.width + 50 : -50,
                y: isFlying ? Math.random() * (canvas.height/2) + 50 : canvas.height - GROUND_HEIGHT - 35,
                w: isFlying ? 20 : 25, h: isFlying ? 20 : 35,
                vx: side === 1 ? -2 : 2, vy: 0,
                hp: hp, maxHp: hp, type: isFlying ? 'wisp' : 'lemurian',
                attackTimer: 0, damage: 10 * difficultyMultiplier, reward: isFlying ? 15 : 10
            });
        }

        function spawnBoss() {
            bossSpawned = true;
            document.getElementById('boss-warning').style.display = 'block';
            setTimeout(() => document.getElementById('boss-warning').style.display = 'none', 4000);
            
            enemies.push({
                x: canvas.width - 100, y: canvas.height - GROUND_HEIGHT - 100,
                w: 60, h: 100, vx: -1.5, vy: 0, hp: 200 * difficultyMultiplier, maxHp: 200 * difficultyMultiplier,
                type: 'boss', attackTimer: 0, damage: 25 * difficultyMultiplier, reward: 200
            });
        }

        function spawnChest() {
            // Escolhe aleatoriamente chão ou uma plataforma
            let base = Math.random() > 0.5 && platforms.length > 0 
                ? platforms[Math.floor(Math.random() * platforms.length)] 
                : { x: 50, w: canvas.width - 100, y: canvas.height - GROUND_HEIGHT };
            
            chests.push({
                x: base.x + Math.random() * (base.w - 30),
                y: base.y - 20, w: 30, h: 20,
                cost: 25 + Math.floor(gameTimeSeconds / 10) * 5 // Fica mais caro com o tempo
            });
        }

        function takeDamage(amt) {
            if (player.invulnTimer > 0) return;
            player.hp -= amt; player.invulnTimer = 40;
            document.getElementById('hp-bar').style.width = Math.max(0, (player.hp/player.maxHp)*100) + '%';
            document.body.style.backgroundColor = "rgba(255,0,0,0.3)";
            setTimeout(() => document.body.style.backgroundColor = "#0d0d14", 100);
            createParticles(player.x + player.width/2, player.y + player.height/2, '#ff0000', 10);
            if (player.hp <= 0) gameOver();
        }

        function grantItem() {
            const item = ITEM_POOL[Math.floor(Math.random() * ITEM_POOL.length)];
            item.apply();
            player.items.push(item);
            
            // Adiciona na UI
            const inv = document.getElementById('inventory');
            const icon = document.createElement('div');
            icon.className = 'item-icon';
            icon.style.backgroundColor = item.color;
            inv.appendChild(icon);
            
            // Partículas comemorativas
            createParticles(player.x, player.y, item.color, 30, 1.5);
        }

        function update() {
            if (isGameOver) return;

            // Movimento do Jogador
            if (keys.left) { player.vx = -player.speed; player.facingRight = false; } 
            else if (keys.right) { player.vx = player.speed; player.facingRight = true; } 
            else { player.vx *= 0.7; }

            if (keys.jump && player.jumpPressed && player.jumpsLeft > 0) {
                player.vy = player.jumpPower; player.isGrounded = false;
                player.jumpsLeft--; player.jumpPressed = false;
                createParticles(player.x + player.width/2, player.y + player.height, '#fff', 5, 0.5);
            }
            if (!keys.jump) player.jumpPressed = true;

            // Tiro
            if (player.shootCooldown > 0) player.shootCooldown--;
            if (keys.shoot && player.shootCooldown <= 0) {
                bullets.push({
                    x: player.facingRight ? player.x + player.width : player.x - 15,
                    y: player.y + 12, w: 18, h: 6,
                    vx: player.facingRight ? 18 : -18, damage: 2,
                    isCrit: Math.random() < player.critChance // Lógica de Acerto Crítico
                });
                player.shootCooldown = player.maxShootCooldown;
                player.vx += player.facingRight ? -1 : 1; 
            }

            // Física
            player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;

            // Chão e Plataformas
            const floorY = canvas.height - GROUND_HEIGHT;
            if (player.y + player.height >= floorY) {
                player.y = floorY - player.height; player.vy = 0; player.isGrounded = true; player.jumpsLeft = 2;
            }
            platforms.forEach(p => {
                if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 1 && 
                    player.y + player.height >= p.y && player.x + player.width > p.x && player.x < p.x + p.w) {
                    player.y = p.y - player.height; player.vy = 0; player.isGrounded = true; player.jumpsLeft = 2;
                }
            });

            if (player.x < 0) player.x = 0; if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.invulnTimer > 0) player.invulnTimer--;

            // Interação com Baús (Auto-compra)
            for (let i = chests.length - 1; i >= 0; i--) {
                const c = chests[i];
                if (checkCollision({x:player.x, y:player.y, w:player.width, h:player.height}, c)) {
                    if (gold >= c.cost) {
                        gold -= c.cost;
                        document.getElementById('gold-display').innerText = `$${gold}`;
                        grantItem();
                        chests.splice(i, 1);
                    }
                }
            }

            // Tiros do Jogador
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                if (b.x < 0 || b.x > canvas.width) { bullets.splice(i, 1); continue; }

                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (checkCollision(b, e)) {
                        let dmg = b.isCrit ? b.damage * 2 : b.damage;
                        e.hp -= dmg;
                        createParticles(b.x, b.y, b.isCrit ? '#ff0000' : '#ffffaa');
                        hit = true;
                        
                        if (e.hp <= 0) {
                            gold += e.reward;
                            document.getElementById('gold-display').innerText = `$${gold}`;
                            
                            // Cura ao matar (Dente de Monstro)
                            if(player.healOnKill > 0) {
                                player.hp = Math.min(player.maxHp, player.hp + player.healOnKill);
                                document.getElementById('hp-bar').style.width = (player.hp/player.maxHp)*100 + '%';
                                createParticles(player.x, player.y, '#2ecc71');
                            }

                            createParticles(e.x+e.w/2, e.y+e.h/2, e.type==='boss'?'#ffaa00':'#ff4444', 15);
                            enemies.splice(j, 1);
                        } else {
                            e.x += b.vx > 0 ? 2 : -2;
                        }
                        break;
                    }
                }
                if (hit) bullets.splice(i, 1);
            }

            // Tiros Inimigos
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.x += eb.vx; eb.y += eb.vy;
                if (eb.x < 0 || eb.x > canvas.width || eb.y > canvas.height) { enemyBullets.splice(i, 1); continue; }
                if (checkCollision({x: eb.x, y: eb.y, w: eb.w, h: eb.h}, {x: player.x, y: player.y, w: player.width, h: player.height})) {
                    takeDamage(eb.damage); enemyBullets.splice(i, 1);
                }
            }

            // Geradores
            let spawnRate = Math.max(30, 120 - (gameTimeSeconds)); 
            if (gameFrame % Math.floor(spawnRate) === 0) spawnEnemy();
            
            // Spawna baú a cada ~10 segundos (600 frames em 60fps)
            if (gameFrame % 600 === 0) spawnChest();

            // Inimigos Logic
            enemies.forEach(e => {
                if (e.type === 'lemurian' || e.type === 'boss') {
                    e.x += e.vx;
                    if (e.x < player.x) e.vx = Math.abs(e.vx); else e.vx = -Math.abs(e.vx);
                    if (checkCollision({x:player.x, y:player.y, w:player.width, h:player.height}, e)) takeDamage(e.damage);
                    
                    if(e.type === 'boss') {
                        e.attackTimer++;
                        if(e.attackTimer > 100 && Math.abs(e.x - player.x) < 200) { e.vy = -10; e.attackTimer = 0; }
                        e.vy += GRAVITY; e.y += e.vy;
                        if(e.y + e.h >= floorY) { 
                            if(e.vy > 5) createParticles(e.x, e.y+e.h, '#777', 15);
                            e.y = floorY - e.h; e.vy = 0; 
                        }
                    }
                } else if (e.type === 'wisp') {
                    e.x += e.vx * 0.5; e.y += Math.sin(gameFrame * 0.05) * 1.5;
                    if (e.x < player.x) e.vx = Math.abs(e.vx); else e.vx = -Math.abs(e.vx);
                    
                    e.attackTimer++;
                    if (e.attackTimer > 120 && Math.abs(e.x - player.x) < 300) {
                        const angle = Math.atan2((player.y + player.height/2) - (e.y + e.h/2), (player.x + player.width/2) - (e.x + e.w/2));
                        enemyBullets.push({ x: e.x + e.w/2, y: e.y + e.h/2, w: 8, h: 8, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5, damage: e.damage });
                        e.attackTimer = 0;
                    }
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            gameFrame++;
        }

        function draw() {
            // Background & Parallax Stars
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#0a0a1a'); bgGrad.addColorStop(1, '#1a1a2b');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            stars.forEach(s => {
                s.x -= s.speed * (player.vx > 0 ? 1 : (player.vx < 0 ? -1 : 0.2));
                if(s.x < 0) s.x = canvas.width; else if(s.x > canvas.width) s.x = 0;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });

            // Plataformas e Chão
            ctx.fillStyle = '#2c3e50';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = '#34495e'; ctx.fillRect(p.x, p.y, p.w, 4);
                ctx.fillStyle = '#2c3e50';
            });
            ctx.fillStyle = '#1e1e24'; ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            ctx.fillStyle = '#4a4e69'; ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 6);

            // Baús
            chests.forEach(c => {
                ctx.fillStyle = '#8e44ad'; // Corpo do baú
                ctx.fillRect(c.x, c.y, c.w, c.h);
                ctx.fillStyle = '#f1c40f'; // Detalhe de ouro no baú
                ctx.fillRect(c.x + c.w/2 - 4, c.y + c.h/2 - 2, 8, 6);
                
                // Texto de Custo Flutuando
                ctx.fillStyle = gold >= c.cost ? '#f1c40f' : '#ff4444';
                ctx.font = '12px Courier New';
                ctx.fillText(`$${c.cost}`, c.x, c.y - 5);
            });

            // Partículas
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 30; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.globalAlpha = 1;

            // Inimigos
            enemies.forEach(e => {
                if (e.type === 'lemurian') {
                    ctx.fillStyle = '#c0392b'; ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = '#000'; ctx.fillRect(e.x + (e.vx > 0 ? e.w-6 : 2), e.y + 6, 4, 4);
                } else if (e.type === 'wisp') {
                    ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 10; ctx.shadowColor = '#2ecc71';
                    ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+e.h/2, e.w/4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (e.type === 'boss') {
                    ctx.fillStyle = '#8e44ad'; ctx.fillRect(e.x, e.y, e.w, e.h);
                    ctx.fillStyle = '#f1c40f'; ctx.fillRect(e.x + (e.vx > 0 ? e.w-15 : 5), e.y + 15, 10, 10);
                }
                ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(e.x, e.y - 10, e.w, 4);
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x, e.y - 10, e.w * (e.hp / e.maxHp), 4);
            });

            // Tiros
            bullets.forEach(b => {
                ctx.shadowBlur = 8; ctx.shadowColor = b.isCrit ? '#ff0000' : '#f1c40f'; 
                ctx.fillStyle = b.isCrit ? '#e74c3c' : '#fff';
                ctx.fillRect(b.x, b.y, b.w, b.h);
            });
            ctx.shadowColor = '#e74c3c'; ctx.fillStyle = '#ffb8b8';
            enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill(); });
            ctx.shadowBlur = 0;

            // Jogador
            if (player.invulnTimer % 8 < 4) {
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.fillStyle = '#3498db'; ctx.fillRect(player.x + (player.facingRight ? 12 : 0), player.y + 6, 10, 8);
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(player.x + (player.facingRight ? -4 : player.width-2), player.y + 10, 6, 20);
            }
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-time').innerText = document.getElementById('time-display').innerText;
            document.getElementById('controls').style.display = 'none';
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>

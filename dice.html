<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incredice: Ultra Dynamic</title>
    <style>
        :root {
            --bg: #e0e0e0;
            --panel: rgba(255, 255, 255, 0.85);
            --text: #333;
            --accent: #00a8ff;
            --crit: #ff4757;
            --transition: 0.8s ease;
        }

        /* Temas Dinâmicos */
        .theme-dark { --bg: #1a1a2e; --panel: rgba(30, 30, 50, 0.9); --text: #eee; --accent: #00d2d3; }
        .theme-royal { --bg: #2d132c; --panel: rgba(61, 12, 60, 0.9); --text: #fce38a; --accent: #ff4b2b; }
        .theme-gold { --bg: #1e1e1e; --panel: rgba(40, 40, 40, 0.9); --text: #ffd700; --accent: #ffd700; }

        body {
            margin: 0; font-family: 'system-ui', sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow: hidden; height: 100vh; transition: var(--transition);
            user-select: none; -webkit-touch-callout: none;
        }

        canvas#bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }

        #ui-wrapper {
            display: grid; grid-template-rows: auto 1fr auto;
            height: 100%; padding: 15px; gap: 15px;
        }

        /* Stats */
        .stats-card {
            background: var(--panel); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 12px; display: flex;
            justify-content: space-around; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: bold; font-size: 1.1rem; color: var(--accent); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }

        /* Combat Zone */
        #combat-container {
            position: relative; background: var(--panel); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        #enemy-sprite { font-size: 100px; z-index: 2; transition: transform 0.1s; }
        
        /* Dado com Animação */
        #dice-visual {
            width: 80px; height: 80px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: #222; margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .rolling { animation: rollAnim 0.15s infinite; }
        @keyframes rollAnim {
            0% { transform: rotate(0deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1.1); }
        }

        /* Surge Mode (D20) */
        .surge-active { border: 4px solid #ff4757 !important; box-shadow: 0 0 20px #ff4757 !important; animation: pulse 0.5s infinite !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Katana Zero Effects */
        .slash {
            position: absolute; background: white; height: 3px; width: 150%;
            z-index: 4; transform-origin: center; animation: slashAnim 0.25s forwards;
        }
        @keyframes slashAnim {
            0% { transform: scaleX(0) rotate(-30deg); opacity: 1; background: #fff; }
            100% { transform: scaleX(1) rotate(-30deg); opacity: 0; background: var(--accent); }
        }

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wii-btn {
            background: var(--panel); border: none; padding: 15px;
            border-radius: 15px; color: var(--text); font-weight: bold;
            transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .wii-btn:active { transform: scale(0.92); }
        #main-tap-zone { grid-column: span 2; height: 80px; background: var(--accent); color: white; font-size: 1.2rem; }

        /* Shop */
        #shop-drawer {
            position: fixed; bottom: -75%; left: 0; width: 100%; height: 75%;
            background: var(--panel); backdrop-filter: blur(25px); z-index: 100;
            transition: 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
            border-radius: 30px 30px 0 0; padding: 20px; overflow-y: auto;
        }
        #shop-drawer.open { bottom: 0; }
        .upgrade-item {
            background: rgba(0,0,0,0.05); padding: 12px; border-radius: 12px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .hp-bar { width: 80%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #hp-fill { height: 100%; width: 100%; background: var(--crit); transition: width 0.2s; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="ui-wrapper">
    <div class="stats-card">
        <div class="stat-item"><span class="stat-label">Ouro</span><span id="gold-val" class="stat-val">0</span></div>
        <div class="stat-item"><span class="stat-label">Sorte</span><span id="luck-val" class="stat-val">1.0</span></div>
        <div class="stat-item"><span class="stat-label">Nível</span><span id="lvl-val" class="stat-val">1</span></div>
    </div>

    <div id="combat-container" onclick="handleTap()">
        <div id="enemy-sprite"></div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div id="dice-visual"></div>
        <div id="surge-label" style="color: #ff4757; font-weight: bold; font-size: 0.7rem; margin-top: 5px; opacity: 0;">D20 SURGE!</div>
    </div>

    <div class="controls">
        <button class="wii-btn" onclick="useAbility()"> EXPLOSÃO</button>
        <button class="wii-btn" onclick="toggleShop()"> SHOP</button>
        <button id="main-tap-zone" class="wii-btn">ATACAR</button>
    </div>
</div>

<div id="shop-drawer" id="shop">
    <div style="width: 40px; height: 4px; background: #aaa; margin: 0 auto 20px;" onclick="toggleShop()"></div>
    <div id="shop-list"></div>
</div>

<script>
    // --- Configurações e Estado ---
    let state = {
        gold: 0,
        lvl: 1,
        luck: 1.0,
        maxFace: 6,
        multiplier: 1,
        autoDmg: 0,
        isSurge: false,
        isRolling: false,
        upgrades: [
            { id: 'luck', name: 'Mão de Midas', desc: 'Melhora rolagens e Surge', cost: 25, lvl: 1, scale: 1.8 },
            { id: 'auto', name: 'Wii Remote', desc: 'Ataque automático', cost: 50, lvl: 0, scale: 1.6 },
            { id: 'dice', name: 'Forjar Dados', desc: 'Aumenta faces (D8, D10...)', cost: 150, lvl: 0, scale: 4 },
            { id: 'crit', name: 'Lâmina Amolada', desc: 'Dano Crítico x3', cost: 500, lvl: 0, scale: 3 }
        ]
    };

    let enemy = { hp: 15, maxHp: 15, sprite: '' };
    const emojis = ['', '', '', '', '', '', '', ''];

    // --- Motor de Áudio (Synth) ---
    const audio = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, type = 'triangle', dur = 0.2, vol = 0.1) {
            this.init();
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
            osc.connect(g); g.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + dur);
        }
    };

    // --- Lógica de Combate ---
    function handleTap() {
        if(state.isRolling) return;
        
        // Animação de Rolagem
        state.isRolling = true;
        const diceEl = document.getElementById('dice-visual');
        diceEl.classList.add('rolling');
        audio.play(200 + Math.random() * 100, 'square', 0.05);

        setTimeout(() => {
            diceEl.classList.remove('rolling');
            state.isRolling = false;
            
            // Cálculo de Sorte (Influência valor alto)
            let rollFace = state.isSurge ? 20 : state.maxFace;
            let roll = Math.floor(Math.random() * rollFace) + 1;
            
            // Mecânica de Sorte: Rerola se for muito baixo baseado na estatística
            if (roll < rollFace / 2 && Math.random() < (state.luck - 1) * 0.2) {
                roll = Math.floor(Math.random() * rollFace) + 1;
            }

            // D20 Surge Proc (Baseado em Sorte)
            if (!state.isSurge && Math.random() < 0.02 * state.luck) triggerSurge();

            applyDamage(roll);
            updateDiceIcon(roll);
        }, 150);
    }

    function applyDamage(val) {
        let isCrit = val === (state.isSurge ? 20 : state.maxFace);
        let finalDmg = val * state.multiplier;
        if(isCrit) finalDmg *= (2 + (state.upgrades[3].lvl * 0.5));

        enemy.hp -= finalDmg;
        
        // Efeitos Visuais
        if(isCrit) {
            createSlash();
            audio.play(150, 'sawtooth', 0.3, 0.2);
            document.body.style.backgroundColor = '#fff';
            setTimeout(() => updateTheme(), 50);
        } else {
            audio.play(400 + val * 20, 'triangle', 0.1);
        }

        if(enemy.hp <= 0) die();
        updateUI();
    }

    function triggerSurge() {
        state.isSurge = true;
        const diceEl = document.getElementById('dice-visual');
        const label = document.getElementById('surge-label');
        diceEl.classList.add('surge-active');
        label.style.opacity = 1;
        audio.play(800, 'sine', 0.5);
        
        setTimeout(() => {
            state.isSurge = false;
            diceEl.classList.remove('surge-active');
            label.style.opacity = 0;
        }, 5000);
    }

    function die() {
        state.gold += state.lvl * 5 * state.luck;
        state.lvl++;
        enemy.maxHp = Math.floor(15 * Math.pow(1.35, state.lvl));
        enemy.hp = enemy.maxHp;
        enemy.sprite = emojis[state.lvl % emojis.length];
        updateTheme();
    }

    // --- Sistema Dinâmico ---
    function updateTheme() {
        const body = document.body;
        body.className = '';
        if(state.lvl > 30) body.classList.add('theme-gold');
        else if(state.lvl > 15) body.classList.add('theme-royal');
        else if(state.lvl > 5) body.classList.add('theme-dark');
    }

    function createSlash() {
        const slash = document.createElement('div');
        slash.className = 'slash';
        slash.style.top = 30 + Math.random() * 40 + '%';
        document.getElementById('combat-container').appendChild(slash);
        setTimeout(() => slash.remove(), 250);
    }

    function useAbility() {
        let hits = 0;
        const interval = setInterval(() => {
            handleTap();
            hits++;
            if(hits >= 8) clearInterval(interval);
        }, 100);
    }

    // --- UI e Loja ---
    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(state.gold);
        document.getElementById('lvl-val').innerText = state.lvl;
        document.getElementById('luck-val').innerText = state.luck.toFixed(1);
        document.getElementById('hp-fill').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
        document.getElementById('enemy-sprite').innerText = enemy.sprite;
        renderShop();
    }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = '';
        state.upgrades.forEach(up => {
            const btn = document.createElement('div');
            btn.className = 'upgrade-item';
            btn.innerHTML = `
                <div><b>${up.name}</b><br><small>${up.desc}</small></div>
                <button class="wii-btn" onclick="buyUpgrade('${up.id}')" ${state.gold < up.cost ? 'disabled' : ''}>$${Math.floor(up.cost)}</button>
            `;
            container.appendChild(btn);
        });
    }

    function buyUpgrade(id) {
        const up = state.upgrades.find(u => u.id === id);
        if(state.gold >= up.cost) {
            state.gold -= up.cost;
            up.lvl++;
            up.cost *= up.scale;
            
            if(id === 'luck') state.luck += 0.3;
            if(id === 'auto') state.autoDmg += 1;
            if(id === 'dice') state.maxFace = [8,10,12,20,100][Math.min(up.lvl-1, 4)] || 100;
            
            updateUI();
            audio.play(600, 'sine', 0.2);
        }
    }

    function toggleShop() { document.getElementById('shop-drawer').classList.toggle('open'); }

    function updateDiceIcon(v) {
        const icons = ['', '', '', '', '', ''];
        document.getElementById('dice-visual').innerText = state.isSurge ? '' : (icons[v-1] || '');
    }

    // --- Background Particles ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initBGP() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = Array(15).fill().map(() => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            r: Math.random()*40+10, vx: Math.random()*0.4-0.2, vy: Math.random()*0.4-0.2
        }));
    }
    function drawBGP() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
        });
        requestAnimationFrame(drawBGP);
    }

    // Auto Clicker Loop
    setInterval(() => {
        if(state.autoDmg > 0) {
            let dmg = (state.autoDmg * (state.maxFace/2)) / 10;
            enemy.hp -= dmg;
            if(enemy.hp <= 0) die();
            updateUI();
        }
    }, 100);

    window.addEventListener('resize', initBGP);
    initBGP(); drawBGP(); updateUI();
</script>
</body>
</html>
